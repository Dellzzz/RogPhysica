<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Entropia Zero - PlataPhysica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#071018;--panel:rgba(10,18,28,.82);--line:#1d3748;
            --accent:#39d5ff;--violet:#9b59b6;--amber:#ffb347;
            --hp1:#37e08a;--hp2:#15d6c0;--xp1:#39d5ff;--xp2:#a45cff;
            --txt:#eaf6ff;
        }
	const records = {
    	  level: Number(localStorage.getItem("ez_record_level")) || 0,
  	  xp: Number(localStorage.getItem("ez_record_xp")) || 0,
   	  time: Number(localStorage.getItem("ez_record_time")) || 0
	};	

	let gameStartTime = Date.now();

        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        html,body{overflow:hidden;width:100%;height:100%;background:var(--bg);font-family:'Rajdhani',system-ui,sans-serif;touch-action:none}
        canvas{display:block;width:100%;height:100%}

        /* ===================== HUD ===================== */
        #hud{position:fixed;top:calc(8px + env(safe-area-inset-top,0px));left:8px;right:8px;z-index:3;pointer-events:none;color:var(--txt);font-variant-numeric:tabular-nums}
        .hudPanel{position:relative;background:linear-gradient(180deg,rgba(13,24,37,.9),rgba(8,14,23,.8));border:1px solid rgba(57,213,255,.28);border-radius:14px;padding:9px 16px 11px;box-shadow:0 8px 26px rgba(0,0,0,.5),inset 0 0 26px rgba(57,213,255,.05);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);overflow:hidden}
        .hudPanel::before,.hudPanel::after{content:"";position:absolute;width:13px;height:13px;border:2px solid rgba(57,213,255,.6);pointer-events:none}
        .hudPanel::before{left:6px;top:6px;border-right:none;border-bottom:none;border-radius:5px 0 0 0}
        .hudPanel::after{right:6px;bottom:6px;border-left:none;border-top:none;border-radius:0 0 5px 0}

        #hudTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
        .hudStat{display:flex;align-items:center;gap:7px;min-width:78px}
        .hudStat.right{justify-content:flex-end}
        .hudIco{width:18px;height:18px;flex:none;opacity:.95}
        .statWrap{display:flex;flex-direction:column;line-height:1}
        .statTag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7fa8c4;font-weight:700;margin-bottom:2px}
        .statVal{font-family:'Orbitron',system-ui;font-weight:700;font-size:17px;letter-spacing:.5px}
        #killBox .statVal{color:var(--amber);text-shadow:0 0 12px rgba(255,179,71,.55)}
        #lvBox .statVal{color:var(--accent);text-shadow:0 0 12px rgba(57,213,255,.55)}
        #lvBox{flex-direction:row-reverse}

        #timerBox{display:flex;flex-direction:column;align-items:center;line-height:1}
        #timerVal{font-family:'Orbitron',system-ui;font-weight:800;font-size:25px;letter-spacing:1px;color:#fff;text-shadow:0 0 16px rgba(57,213,255,.5)}
        #timerBox .statTag{margin-top:3px;margin-bottom:0}

        .barRow{display:flex;align-items:center;gap:9px;margin-top:6px}
        .barLabel{font-family:'Orbitron',system-ui;font-size:10px;font-weight:700;letter-spacing:1px;color:#cfe8f6;width:26px;text-align:right;flex:none}
        .barTrack{position:relative;flex:1;height:15px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);overflow:hidden}
        .barTrack.xp{box-shadow:0 0 14px rgba(120,120,255,.16)}
        .barFill{position:absolute;left:0;top:0;bottom:0;width:100%;transform-origin:left center;transform:scaleX(1);border-radius:8px;transition:transform .2s cubic-bezier(.4,0,.2,1)}
        .barFill.hp{background:linear-gradient(90deg,var(--hp2),var(--hp1))}
        .barFill.xp{background:linear-gradient(90deg,var(--xp1),var(--xp2))}
        .barFill.low{animation:hpPulse .85s ease-in-out infinite}
        @keyframes hpPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}}
        .barFill.xp::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:translateX(-100%);animation:shimmer 2.4s linear infinite}
        @keyframes shimmer{to{transform:translateX(260%)}}
        .barText{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.5px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:2}

        /* ============ Indicadores de arma automatica ============ */
        #autoWeps{position:fixed;right:22px;bottom:150px;display:flex;flex-direction:column;gap:9px;align-items:flex-end;z-index:3;pointer-events:none}
        .wep{display:flex;align-items:center;gap:8px;opacity:0;transform:translateX(14px);transition:opacity .35s,transform .35s}
        .wep.on{opacity:1;transform:translateX(0)}
        .wepName{font-family:'Orbitron',system-ui;font-size:9px;letter-spacing:1px;color:#bfe6f5;background:rgba(8,14,23,.7);padding:3px 7px;border-radius:6px;text-shadow:0 1px 2px #000}
        .wepIco{position:relative;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(10,18,28,.82);border:1px solid rgba(255,255,255,.14);box-shadow:0 4px 14px rgba(0,0,0,.45);overflow:hidden;flex:none}
        .wepIco .cd{position:absolute;left:0;bottom:0;width:100%;height:0;background:linear-gradient(180deg,rgba(57,213,255,.15),rgba(57,213,255,.4));transition:height .12s linear}
        .wepIco svg{position:relative;z-index:1;width:24px;height:24px}
        .wep.ready .wepIco{border-color:rgba(120,233,255,.8);box-shadow:0 0 18px rgba(57,213,255,.55),0 4px 14px rgba(0,0,0,.45);animation:wepReady 1.2s ease-in-out infinite}
        @keyframes wepReady{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

        /* ===================== Controles ===================== */
        #controls{position:fixed;inset:0;pointer-events:none}
        #joy{position:absolute;left:20px;bottom:calc(20px + env(safe-area-inset-bottom,0px));width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(57,213,255,.06),rgba(255,255,255,.05));border:2px solid rgba(255,255,255,.16);pointer-events:auto;box-shadow:inset 0 0 24px rgba(57,213,255,.08)}
        #stick{position:absolute;left:42px;top:42px;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#6fe6ff,var(--accent));box-shadow:0 0 16px rgba(57,213,255,.6)}
        .btn{position:absolute;width:84px;height:84px;border:none;border-radius:50%;color:#fff;font-family:'Orbitron',system-ui;font-weight:700;font-size:13px;letter-spacing:1px;pointer-events:auto;transition:opacity .2s,transform .08s;display:flex;align-items:center;justify-content:center}
        .btn:active{transform:scale(.93)}
        #gravBtn{right:24px;bottom:calc(36px + env(safe-area-inset-bottom,0px));background:radial-gradient(circle at 50% 35%,#b272d8,#693f8e);border:2px solid rgba(214,150,255,.6);box-shadow:0 0 20px rgba(155,89,182,.55),inset 0 0 18px rgba(255,255,255,.12)}
        #muteBtn{position:fixed;top:calc(env(safe-area-inset-top,0px) + 104px);right:12px;width:38px;height:38px;border:1px solid rgba(57,213,255,.3);border-radius:10px;background:rgba(10,18,28,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;pointer-events:auto;z-index:4;cursor:pointer;transition:transform .08s}
        #muteBtn:active{transform:scale(.92)}
        #muteBtn svg{width:20px;height:20px}
        #muteBtn .slash{display:none}
        #muteBtn.muted{border-color:rgba(255,90,90,.5)}
        #muteBtn.muted .wave{display:none}
        #muteBtn.muted .slash{display:block}

        /* ===================== Level up / Game over ===================== */
        #level{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);z-index:5;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
        #card{width:min(90vw,420px);background:linear-gradient(180deg,rgba(15,26,40,.96),rgba(9,16,26,.96));padding:22px;border-radius:18px;color:#fff;border:1px solid rgba(57,213,255,.3);box-shadow:0 18px 50px rgba(0,0,0,.6),inset 0 0 30px rgba(57,213,255,.06)}
        #card h3{font-family:'Orbitron',system-ui;font-weight:700;font-size:17px;letter-spacing:1px;text-align:center;color:var(--accent);text-shadow:0 0 14px rgba(57,213,255,.4);margin-bottom:4px}
        .opt{width:100%;padding:13px 14px;margin-top:10px;background:linear-gradient(90deg,rgba(23,48,64,.9),rgba(18,36,52,.9));border:1px solid rgba(57,213,255,.18);border-radius:11px;color:#fff;text-align:left;font-family:'Rajdhani',system-ui;font-weight:600;font-size:15px;cursor:pointer;transition:background .15s,border-color .15s,transform .08s}
        .opt:active{transform:scale(.98)}
        .opt:hover{background:linear-gradient(90deg,rgba(30,62,82,.95),rgba(23,46,66,.95));border-color:rgba(57,213,255,.45)}
        #gameOver{display:none;position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:10;align-items:center;justify-content:center;flex-direction:column;color:#fff}
        #gameOver h1{font-family:'Orbitron',system-ui;color:#ff4757;font-size:46px;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 24px rgba(255,71,87,.5)}
        #finalTime{font-family:'Rajdhani',system-ui;font-size:22px;margin-bottom:24px;color:#cfe0ec}
        #gameOver button{font-family:'Orbitron',system-ui;padding:15px 32px;font-size:18px;background:linear-gradient(90deg,#39d5ff,#7fe9ff);border:none;border-radius:12px;color:#071018;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 0 24px rgba(57,213,255,.5)}

        /* ===================== Menu inicial ===================== */
        body.menu-open #hud, body.menu-open #controls, body.menu-open #autoWeps, body.menu-open #muteBtn{display:none}
        .screen{position:fixed;inset:0;z-index:12;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 50% 30%,rgba(13,28,44,.86),rgba(5,10,16,.95));backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#eaf6ff;overflow-y:auto}
        .brand{font-family:'Orbitron',system-ui;font-weight:800;font-size:34px;letter-spacing:3px;text-align:center;color:#fff;text-shadow:0 0 26px rgba(57,213,255,.55);line-height:1.05}
        .brand .sub{display:block;font-size:13px;letter-spacing:5px;font-weight:600;color:#7fe9ff;margin-top:6px}
        .screenTitle{font-family:'Orbitron',system-ui;font-weight:700;font-size:20px;letter-spacing:1.5px;color:#39d5ff;text-shadow:0 0 16px rgba(57,213,255,.45);margin-bottom:4px;text-align:center}
        .screenSub{font-size:13px;color:#9fc4d8;margin-bottom:16px;text-align:center}
        .menuBtns{display:flex;flex-direction:column;gap:12px;width:min(86vw,360px);margin-top:30px}
        .menuBtn{font-family:'Rajdhani',system-ui;font-weight:700;font-size:17px;letter-spacing:.5px;padding:15px 18px;border-radius:13px;border:1px solid rgba(57,213,255,.25);background:linear-gradient(90deg,rgba(23,48,64,.92),rgba(16,30,46,.92));color:#eaf6ff;cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .08s,border-color .15s,background .15s}
        .menuBtn:active{transform:scale(.98)}
        .menuBtn:hover{border-color:rgba(57,213,255,.55);background:linear-gradient(90deg,rgba(30,62,82,.95),rgba(21,40,60,.95))}
        .menuBtn.primary{background:linear-gradient(90deg,#39d5ff,#7fe9ff);color:#071018;border:none;justify-content:center;box-shadow:0 0 22px rgba(57,213,255,.45)}
        .menuBtn .mIco{width:22px;height:22px;flex:none}
        .menuBtn.ghost{background:transparent;border-color:rgba(255,255,255,.18);color:#bcd6e6;justify-content:center}

        .charGrid{display:flex;flex-direction:column;gap:11px;width:min(88vw,400px)}
        .charCard{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:13px;align-items:center;padding:13px 15px;border-radius:13px;border:1px solid rgba(255,255,255,.12);background:rgba(12,22,34,.85);color:#eaf6ff;cursor:pointer;text-align:left;transition:transform .08s,border-color .15s}
        .charCard:active{transform:scale(.98)}
        .charCard.sel{border-color:#39d5ff;box-shadow:0 0 18px rgba(57,213,255,.4),inset 0 0 18px rgba(57,213,255,.08)}
        .charDot{grid-row:1 / span 2;width:34px;height:34px;border-radius:50%}
        .charName{font-family:'Orbitron',system-ui;font-weight:700;font-size:15px;letter-spacing:.5px}
        .charDesc{font-size:12.5px;color:#9fc4d8}

        .collectGrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:min(92vw,440px)}
        .colCard{display:flex;flex-direction:column;gap:5px;padding:13px;border-radius:13px;border:1px solid rgba(255,255,255,.1);background:rgba(12,22,34,.8);min-height:96px}
        .colCard.got{border-color:rgba(57,213,255,.45);background:linear-gradient(180deg,rgba(20,40,58,.9),rgba(12,22,34,.9));box-shadow:inset 0 0 16px rgba(57,213,255,.08)}
        .colIco{font-size:22px;color:#3a4a5c}
        .colCard.got .colIco{color:#7fe9ff;text-shadow:0 0 12px rgba(127,233,255,.6)}
        .colName{font-family:'Orbitron',system-ui;font-weight:700;font-size:12.5px;letter-spacing:.5px;color:#dfeefb}
        .colCard:not(.got) .colName{color:#7d93a4}
        .colFact{font-size:11.5px;line-height:1.35;color:#9fc4d8}

        #toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top,0px) + 110px);transform:translate(-50%,-12px);z-index:9;background:linear-gradient(90deg,rgba(13,28,44,.96),rgba(9,18,28,.96));border:1px solid rgba(57,213,255,.5);color:#eaf6ff;font-family:'Rajdhani',system-ui;font-weight:700;font-size:14px;letter-spacing:.5px;padding:10px 18px;border-radius:12px;box-shadow:0 8px 26px rgba(0,0,0,.5),0 0 22px rgba(57,213,255,.35);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
        #toast.show{opacity:1;transform:translate(-50%,0)}
    </style>
</head>
<body>
    <div id="hud">
        <div class="hudPanel">
            <div id="hudTop">
                <div class="hudStat" id="killBox">
                    <svg class="hudIco" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.6 2 4 5.4 4 9.7c0 2.5 1.2 4.4 3 5.7v2.4c0 .7.6 1.2 1.3 1.2h.7v1.3c0 .4.3.7.7.7s.7-.3.7-.7V19h3v1.3c0 .4.3.7.7.7s.7-.3.7-.7V19h.7c.7 0 1.3-.5 1.3-1.2v-2.4c1.8-1.3 3-3.2 3-5.7C20 5.4 16.4 2 12 2Z" fill="#ffb347"/><circle cx="9" cy="10" r="1.6" fill="#1a1208"/><circle cx="15" cy="10" r="1.6" fill="#1a1208"/></svg>
                    <div class="statWrap"><span class="statTag">Abates</span><span class="statVal" id="killVal">0</span></div>
                </div>
                <div id="timerBox">
                    <span id="timerVal">0:00</span>
                    <span class="statTag">Sobrevivência</span>
                </div>
                <div class="hudStat right" id="lvBox">
                    <svg class="hudIco" viewBox="0 0 24 24" fill="none"><path d="M12 2 21 7v10l-9 5-9-5V7l9-5Z" stroke="#39d5ff" stroke-width="1.6" fill="rgba(57,213,255,.12)"/><path d="m12 7 4.5 2.5v5L12 17l-4.5-2.5v-5L12 7Z" fill="#39d5ff"/></svg>
                    <div class="statWrap"><span class="statTag">Nível</span><span class="statVal" id="lvVal">1</span></div>
                </div>
            </div>
            <div class="barRow">
                <span class="barLabel">HP</span>
                <div class="barTrack"><div class="barFill hp" id="hpFill"></div><span class="barText" id="hpText">100/100</span></div>
            </div>
            <div class="barRow">
                <span class="barLabel">XP</span>
                <div class="barTrack xp"><div class="barFill xp" id="xpFill"></div><span class="barText" id="xpText">0/15</span></div>
            </div>
        </div>
    </div>

    <div id="autoWeps">
        <div class="wep" id="wepFar">
            <span class="wepName">FARADAY</span>
            <div class="wepIco"><div class="cd"></div>
                <svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="3.5" width="17" height="17" rx="3" stroke="#7fe9ff" stroke-width="1.6"/><path d="M8.5 3.5v17M15.5 3.5v17M3.5 8.5h17M3.5 15.5h17" stroke="#7fe9ff" stroke-width=".8" opacity=".7"/><path d="M13 6.5 9 12.5h2.6L11 17.5l4.4-6.4H12.6L13 6.5Z" fill="#ffe066"/></svg>
            </div>
        </div>
        <div class="wep" id="wepPri">
            <span class="wepName">PRISMA</span>
            <div class="wepIco"><div class="cd"></div>
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 4 21 19H3L12 4Z" stroke="#7fe9ff" stroke-width="1.6" fill="rgba(127,233,255,.1)"/><path d="M3 12h6" stroke="#ff5ed2" stroke-width="1.6"/><path d="M12 12h9" stroke="#5eff9b" stroke-width="1.6"/><path d="M9 16h11" stroke="#ffe066" stroke-width="1.4"/></svg>
            </div>
        </div>
    </div>

    <canvas id="cv"></canvas>
    <div id="controls">
        <div id="joy"><div id="stick"></div></div>
        <button class="btn" id="gravBtn">GRAV</button>
    </div>

    <button id="muteBtn" aria-label="Ligar/desligar som">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 9v6h4l5 4V5L8 9H4Z" fill="#7fe9ff"/>
            <path class="wave" d="M16 8.5a4.5 4.5 0 0 1 0 7" stroke="#7fe9ff" stroke-width="1.8" stroke-linecap="round"/>
            <path class="wave" d="M18.5 6a8 8 0 0 1 0 12" stroke="#7fe9ff" stroke-width="1.8" stroke-linecap="round"/>
            <line class="slash" x1="15" y1="5" x2="21" y2="19" stroke="#ff5a5a" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>
    
    <div id="level">
        <div id="card">
            <h3>Escolha uma melhoria</h3>
            <div id="opts"></div>
        </div>
    </div>

    <div id="gameOver">
        <h1>Você Morreu</h1>
        <p id="finalTime"></p>
        <button onclick="location.reload()">Tentar Novamente</button>
    </div>

    <div class="screen" id="startMenu">
        <div class="brand">ENTROPIA ZERO<span class="sub">PlataPhysica</span></div>
        <div class="menuBtns">
            <button class="menuBtn primary" id="btnStart">
                <svg class="mIco" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5Z" fill="#071018"/></svg>
                Iniciar jogo
            </button>
            <button class="menuBtn" id="btnChars">
                <svg class="mIco" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#7fe9ff" stroke-width="1.7"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke="#7fe9ff" stroke-width="1.7"/></svg>
                Personagens
            </button>
            <button class="menuBtn" id="btnCollect">
                <svg class="mIco" viewBox="0 0 24 24" fill="none"><path d="m12 3 2.6 5.6 6 .6-4.5 4 1.3 5.9L12 21l-5.4 3.1L8 18.2l-4.5-4 6-.6L12 3Z" stroke="#7fe9ff" stroke-width="1.5" stroke-linejoin="round"/></svg>
                Colecionáveis
            </button>
            <button class="menuBtn ghost" id="btnPlatform">
                <svg class="mIco" viewBox="0 0 24 24" fill="none"><path d="M11 6l-6 6 6 6M5 12h14" stroke="#bcd6e6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Voltar para plataforma
            </button>
	<div class="credits">
        	Jogo desenvolvido pelo Prof. Jardel A. Leite
   	</div>
        </div>
    </div>

    <div class="screen" id="charsScreen">
        <div class="screenTitle">PERSONAGENS</div>
        <div class="screenSub">Cada um tem uma cor e um bônus passivo.</div>
        <div class="charGrid" id="charGrid"></div>
        <div class="menuBtns"><button class="menuBtn ghost btnBack">Voltar</button></div>
    </div>

    <div class="screen" id="collectScreen">
        <div class="screenTitle">COLECIONÁVEIS</div>
        <div class="screenSub">Conquiste jogando. Cada um traz uma curiosidade de física.</div>
        <div class="collectGrid" id="collectGrid"></div>
        <div class="menuBtns"><button class="menuBtn ghost btnBack">Voltar</button></div>
    </div>

    <div id="toast"></div>

<script>
const c = document.getElementById("cv"),
      ctx = c.getContext("2d"),
      level = document.getElementById("level"),
      opts = document.getElementById("opts"),
      gravBtn = document.getElementById("gravBtn"),
      gameOverScreen = document.getElementById("gameOver"),
      finalTimeText = document.getElementById("finalTime"),
      elKill = document.getElementById("killVal"),
      elTimer = document.getElementById("timerVal"),
      elLv = document.getElementById("lvVal"),
      elHpFill = document.getElementById("hpFill"),
      elHpText = document.getElementById("hpText"),
      elXpFill = document.getElementById("xpFill"),
      elXpText = document.getElementById("xpText"),
      wepFar = document.getElementById("wepFar"),

let actx = null, masterGain = null, soundOn = true;
const VOL = 0.3;
function ensureAudio() {
    if (actx) return;
    try {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = actx.createGain();
        masterGain.gain.value = soundOn ? VOL : 0;
        masterGain.connect(actx.destination);
    } catch (e) { actx = null; }
}
function unlockAudio() {                       // navegadores exigem gesto do usuario
    ensureAudio();
    if (actx && actx.state === "suspended") actx.resume();
}

// Um tom curto com envelope (onda quadrada = som retro). slideTo opcional faz "pew".
function beep(freq, dur, type, vol, slideTo) {
    if (!actx || actx.state !== "running" || !soundOn) return;
    let t = actx.currentTime;
    let osc = actx.createOscillator(), g = actx.createGain();
    osc.type = type || "square";
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.2, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t + dur + 0.02);
}
// Sequencia de notas com tempo preciso (para jingles)
function notesAt(seq, type, vol) {
    if (!actx || actx.state !== "running" || !soundOn) return;
    let t0 = actx.currentTime;
    seq.forEach(n => {
        let osc = actx.createOscillator(), g = actx.createGain();
        osc.type = type || "square";
        osc.frequency.value = n[0];
        g.gain.setValueAtTime(0.0001, t0 + n[1]);
        g.gain.exponentialRampToValueAtTime(vol || 0.2, t0 + n[1] + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + n[1] + n[2]);
        osc.connect(g); g.connect(masterGain);
        osc.start(t0 + n[1]); osc.stop(t0 + n[1] + n[2] + 0.02);
    });
}

// Gera uma posicao em um anel logo fora da tela, ao redor do jogador (presos ao mundo).
function spawnPos() {
    let screenR = Math.hypot(innerWidth, innerHeight) / 2;
    let dist = screenR + 80 + Math.random() * 260;
    let ang = Math.random() * Math.PI * 2;
    let x = p.x + Math.cos(ang) * dist;
    let y = p.y + Math.sin(ang) * dist;
    // se cair fora do mundo, tenta o lado oposto; senao, prende na borda
    if (x < 40 || x > world.w - 40) x = p.x - Math.cos(ang) * dist;
    if (y < 40 || y > world.h - 40) y = p.y - Math.sin(ang) * dist;
    x = Math.max(40, Math.min(world.w - 40, x));
    y = Math.max(40, Math.min(world.h - 40, y));
    return { x, y };
}

// Curva de XP suavizada (quadratica leve) no lugar da exponencial 1.5x
function xpForNext(lv) { return Math.round(10 + lv * 7 + lv * lv * 1.2); }

function gain(v) {
    p.xp += (v * p.xpMult);
    while(p.xp >= p.next) {
        p.xp -= p.next;
        p.lv++;
        p.next = xpForNext(p.lv);
        sndLevel();
        sync();
        showLevel();
    }
}

function upd() {
    let now = performance.now();
    let dt = now - lastTime;
    lastTime = now;
    
    if(paused) return;
    
    elapsedTime += dt;

    if (p.hp <= 0 && !p.dead) {
        p.dead = true;
        p.hp = 0;
        sndOver();
        let mins = Math.floor(elapsedTime / 60000);
        let secs = Math.floor((elapsedTime % 60000) / 1000);
        finalTimeText.textContent = `Sobreviveu: ${mins}:${secs.toString().padStart(2, "0")} | Nível: ${p.lv} | Abates: ${kills}`;
        gameOverScreen.style.display = "flex";
        paused = true;
        return;
    }

    let skillRem = Math.max(0, skill.cd - (now - skill.last));
    if (skillRem > 0) {
        gravBtn.textContent = (skillRem / 1000).toFixed(1) + "s";
        gravBtn.style.opacity = "0.5";
    } else {
        gravBtn.textContent = "GRAV";
        gravBtn.style.opacity = "1";
    }

    let kx = 0, ky = 0;
    if(keys.w || keys.W) ky -= 1;
    if(keys.s || keys.S) ky += 1;
    if(keys.a || keys.A) kx -= 1;
    if(keys.d || keys.D) kx += 1;
    if(kx !== 0 && ky !== 0) { kx *= 0.7071; ky *= 0.7071; }

    let inputX = joy.dx + kx;
    let inputY = joy.dy + ky;
    
    if (inputX !== 0 || inputY !== 0) { p.lastAngle = Math.atan2(inputY, inputX); }

    p.vx += inputX * p.spd; p.vy += inputY * p.spd;
    p.vx *= 1 - world.f; p.vy *= 1 - world.f;
    p.x += p.vx; p.y += p.vy;
    p.x = Math.max(p.r, Math.min(world.w - p.r, p.x));
    p.y = Math.max(p.r, Math.min(world.h - p.r, p.y));
    
    if (elapsedTime >= nextHordeTime) {
        nextHordeTime += 15000;
        for(let i = 0; i < 40; i++) {
            enemies.push({
                x: p.x + (Math.random() - 0.5) * 2000, 
                y: p.y + (Math.random() - 0.5) * 2000,
                vx: 0, vy: 0, r: 14, hp: 20, maxHp: 20, color: "#f1c40f", drops: 1, chest: false, spdMult: 0.7,
                hitOrbs: new Set(), slowUntil: 0
            });
        }
    }

    baseOrbAngle += p.orbSpeed;
    
    orbs.forEach((o, idx) => {
        o.a = baseOrbAngle + (idx * (Math.PI * 2) / orbs.length);
        let ox = p.x + Math.cos(o.a) * o.d, oy = p.y + Math.sin(o.a) * o.d;
        
        for(let i=enemies.length-1; i>=0; i--){
            let e = enemies[i], dx = e.x - ox, dy = e.y - oy, d = Math.hypot(dx,dy);
            
            if(d < e.r + 9) { 
                if (!e.hitOrbs.has(o.id)) { 
                    e.hitOrbs.add(o.id);
                    applyDamage(e, 20);
                    
                    if(e.hp <= 0) killEnemy(e, i);
                }
            } else {
                e.hitOrbs.delete(o.id);
            }
        }
    });

    if(upLevels["Lançadora de maçãs"] > 0) {
        if(now - lastAppleTime >= 2000) { // A cada 2 segundos
            lastAppleTime = now;
            
            // Mira no inimigo mais próximo
            let closest = null, minDist = Infinity;
            enemies.forEach(e => {
                let d = Math.hypot(e.x - p.x, e.y - p.y);
                if(d < minDist) { minDist = d; closest = e; }
            });
            
            let targetAngle = p.lastAngle;
            if(closest) {
                targetAngle = Math.atan2(closest.y - p.y, closest.x - p.x);
            }

            let numApples = upLevels["Lançadora de maçãs"];
            for(let i=0; i<numApples; i++) {
                let spread = numApples > 1 ? (i - (numApples-1)/2) * 0.25 : 0;
                apples.push({
                    x: p.x, y: p.y,
                    vx: Math.cos(targetAngle + spread) * 7, 
                    vy: Math.sin(targetAngle + spread) * 7,
                    r: 6, bounces: 0, maxBounces: 3 // Limite fixo de 3 ricochetes
                });
            }
        }
    }

    for(let i=apples.length-1; i>=0; i--) {
        let a = apples[i];
        a.x += a.vx; a.y += a.vy;

        let minX = cam.x, maxX = cam.x + innerWidth;
        let minY = cam.y, maxY = cam.y + innerHeight;
        let bounced = false;

        if(a.x - a.r < minX) { a.x = minX + a.r; a.vx *= -1; bounced = true; }
        else if(a.x + a.r > maxX) { a.x = maxX - a.r; a.vx *= -1; bounced = true; }
        if(a.y - a.r < minY) { a.y = minY + a.r; a.vy *= -1; bounced = true; }
        else if(a.y + a.r > maxY) { a.y = maxY - a.r; a.vy *= -1; bounced = true; }

        if(bounced) {
            a.bounces++;
            if(a.bounces > a.maxBounces) { apples.splice(i, 1); continue; }
        }

        for(let j=enemies.length-1; j>=0; j--) {
            let e = enemies[j];
            if(Math.hypot(e.x - a.x, e.y - a.y) < e.r + a.r) {
                applyDamage(e, 25);
                apples.splice(i, 1);
                
                if(e.hp <= 0) killEnemy(e, j);
                break;
            }
        }
    }

    // ===================== Gaiola de Faraday =====================
    let fLv = upLevels["Gaiola de Faraday"];
    if (fLv > 0) {
        let fcd = FARADAY_CD[fLv - 1];
        if (!faraday.active && now - faraday.last >= fcd) {
            faraday.last = now;
            faraday.active = true;
            sndFaraday();
            faraday.until = now + 5000; // duracao da gaiola: 5s (ajuste aqui se quiser)
            faraday.safe = new Set();
            // Inimigos que ja estao dentro ficam protegidos
            enemies.forEach(e => { if (Math.hypot(e.x - p.x, e.y - p.y) <= faraday.r) faraday.safe.add(e); });
        }
        if (faraday.active) {
            if (now >= faraday.until) {
                faraday.active = false;
            } else {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (faraday.safe.has(e)) continue;            // estava dentro: nao sofre dano
                    if (Math.hypot(e.x - p.x, e.y - p.y) <= faraday.r) {
                        zaps.push({x: e.x, y: e.y, life: 1});     // faisca de abate
                        killEnemy(e, i);                          // encostou de fora: abate instantaneo
                    }
                }
            }
        }
    }

    // ===================== Prisma de Luz =====================
    let prLv = upLevels["Prisma de Luz"];
    if (prLv > 0) {
        let prcd = PRISM_CD[prLv - 1];
        prism.bounce = (prLv >= 5); // nivel 5: o laser vai e volta
        if (!prism.active && now - prism.last >= prcd) {
            prism.last = now;
            prism.active = true;
            sndPrism();
            prism.angle = -Math.PI;
            prism.dir = 1;
            prism.phase = 0;
            prism.hit = new Set();
        }
        if (prism.active) {
            let speed = (Math.PI * 2) / 420;                     // varredura completa em ~420ms
            let prev = prism.angle;
            prism.angle += prism.dir * speed * dt;
            let lo = Math.min(prev, prism.angle), hi = Math.max(prev, prism.angle);
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let dxp = e.x - p.x, dyp = e.y - p.y;
                let de = Math.hypot(dxp, dyp);
                if (de > prism.len) continue;
                let ea = Math.atan2(dyp, dxp);                   // angulo do inimigo (-PI..PI)
                if (ea >= lo && ea <= hi && !prism.hit.has(e)) { // o feixe cruzou este inimigo neste quadro
                    prism.hit.add(e);
                    applyDamage(e, 20);
                    if (e.hp <= 0) killEnemy(e, i);
                }
            }
            if (prism.dir > 0 && prism.angle >= Math.PI) {
                if (prism.bounce && prism.phase === 0) {
                    prism.phase = 1; prism.dir = -1; prism.angle = Math.PI; prism.hit = new Set();
                } else { prism.active = false; }
            } else if (prism.dir < 0 && prism.angle <= -Math.PI) {
                prism.active = false;
            }
        }
    }

    // Atualiza faiscas de abate da gaiola
    for (let i = zaps.length - 1; i >= 0; i--) {
        zaps[i].life -= 0.06;
        if (zaps[i].life <= 0) zaps.splice(i, 1);
    }

    let globalSpeedMult = Math.min(2, 1 + (elapsedTime / 180000));

    // Grid espacial: a separacao inimigo-inimigo deixa de ser O(n^2) e fica ~O(n)
    let grid = new Map();
    for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        let key = Math.floor(e.x / CELL) + "," + Math.floor(e.y / CELL);
        let cell = grid.get(key);
        if (cell) cell.push(i); else grid.set(key, [i]);
    }

    for(let i=0; i<enemies.length; i++){
        let e1 = enemies[i];
        let cx = Math.floor(e1.x / CELL), cy = Math.floor(e1.y / CELL);

        // Checa colisao apenas contra vizinhos das 9 celulas ao redor
        for (let gx = cx - 1; gx <= cx + 1; gx++) {
            for (let gy = cy - 1; gy <= cy + 1; gy++) {
                let cell = grid.get(gx + "," + gy);
                if (!cell) continue;
                for (let cidx = 0; cidx < cell.length; cidx++) {
                    let j = cell[cidx];
                    if (j <= i) continue;          // cada par e tratado uma unica vez
                    let e2 = enemies[j];
                    let dx = e2.x - e1.x, dy = e2.y - e1.y;
                    let dist = Math.hypot(dx, dy);
                    let minDist = e1.r + e2.r;
                    if(dist < minDist && dist > 0) {
                        let overlap = minDist - dist;
                        let nx = dx / dist, ny = dy / dist;
                        e1.x -= nx * overlap * 0.5;
                        e1.y -= ny * overlap * 0.5;
                        e2.x += nx * overlap * 0.5;
                        e2.y += ny * overlap * 0.5;
                    }
                }
            }
        }

        let dxP = p.x - e1.x, dyP = p.y - e1.y, dP = Math.max(1, Math.hypot(dxP, dyP));
        
        let isSlowed = now < e1.slowUntil;
        let speedPenalty = isSlowed ? 0.3 : 1.0; 

        e1.vx += (dxP/dP) * .02 * e1.spdMult * globalSpeedMult * speedPenalty;
        e1.vy += (dyP/dP) * .02 * e1.spdMult * globalSpeedMult * speedPenalty;
        e1.vx *= .98;
        e1.vy *= .98;
        
        if(dP < e1.r + p.r){
            let o = e1.r + p.r - dP, nxP = dxP/dP, nyP = dyP/dP;
            p.x += nxP * o * .5; p.y += nyP * o * .5;
            e1.x -= nxP * o * .5; e1.y -= nyP * o * .5;
            p.hp = Math.max(0, p.hp - .15);
            hurtFlash = Math.min(0.8, hurtFlash + 0.10);   // flash vermelho
            sndHurt();
        }
        
        e1.x += e1.vx; e1.y += e1.vy;
    }

    for(let i=drops.length-1; i>=0; i--){
        let o = drops[i], d = Math.hypot(p.x - o.x, p.y - o.y);
        if(d < p.pickup || o.grav){ o.x += (p.x - o.x) * .12; o.y += (p.y - o.y) * .12; }
        if(d < 10){ gain(p.orbXp); sndPickup(); drops.splice(i,1); }
    }
    
    for(let i=chests.length-1; i>=0; i--){
        let c = chests[i], d = Math.hypot(p.x - c.x, p.y - c.y);
        if(d < p.pickup || c.grav){ c.x += (p.x - c.x) * .12; c.y += (p.y - c.y) * .12; }
        if(d < 15){ 
            chests.splice(i,1); 
            chestsOpened++;
            p.lv++;
            p.next = xpForNext(p.lv);
            sndChest();
            sync();
            showLevel();
        }
    }
    
    // Atualiza textos de dano (duracao maior: subem mais devagar e somem so no fim)
    for(let i=dmgTexts.length-1; i>=0; i--){
        let t = dmgTexts[i];
        t.y -= 0.35;
        t.life -= 0.009;
        if(t.life <= 0) dmgTexts.splice(i, 1);
    }

    if (hurtFlash > 0.001) hurtFlash *= 0.9; else hurtFlash = 0;  // decai o flash vermelho
    
    cam.x += (p.x - innerWidth/2 - cam.x) * cam.s;
    cam.y += (p.y - innerHeight/2 - cam.y) * cam.s;
    
    let mins = Math.floor(elapsedTime / 60000);
    let secs = Math.floor((elapsedTime % 60000) / 1000);
    let timeStr = `${mins}:${secs.toString().padStart(2, "0")}`;

    // ===================== Atualiza HUD =====================
    elKill.textContent = kills;
    elTimer.textContent = timeStr;
    elLv.textContent = p.lv;

    let hpPct = Math.max(0, p.hp / p.maxHp);
    elHpFill.style.transform = `scaleX(${hpPct})`;
    elHpFill.classList.toggle("low", hpPct < 0.25);
    elHpText.textContent = `${Math.max(0, Math.floor(p.hp))}/${p.maxHp}`;

    let xpPct = Math.max(0, Math.min(1, p.xp / p.next));
    elXpFill.style.transform = `scaleX(${xpPct})`;
    elXpText.textContent = `${Math.floor(p.xp)}/${p.next}`;

    updateWep(wepFar, upLevels["Gaiola de Faraday"], faraday.last, FARADAY_CD, now, faraday.active);
    updateWep(wepPri, upLevels["Prisma de Luz"], prism.last, PRISM_CD, now, prism.active);

    checkCollectibles();
}

// Atualiza o indicador de recarga de uma arma automatica
function updateWep(el, lv, last, cdArr, now, active) {
    if (lv <= 0) { el.classList.remove("on", "ready"); return; }
    el.classList.add("on");
    let cd = cdArr[lv - 1];
    let elapsed = now - last;
    let ready = elapsed >= cd;
    let fill = el.querySelector(".cd");
    fill.style.height = active ? "100%" : Math.min(100, (elapsed / cd) * 100) + "%";
    el.classList.toggle("ready", ready && !active);
}

function bar(x, y, w, h, p, f, b) { ctx.fillStyle = b; ctx.fillRect(x,y,w,h); ctx.fillStyle = f; ctx.fillRect(x,y,w*p,h); }

// Desenha o prisma triangular girando, com arestas em arco-iris
function drawPrism(x, y, alpha) {
    let r = 13;
    let pn = performance.now();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y + Math.sin(pn / 400) * 3); // flutuacao leve
    ctx.rotate(pn / 320);
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
        let a = -Math.PI / 2 + i * (Math.PI * 2 / 3);
        let px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    let g = ctx.createLinearGradient(-r, -r, r, r);
    g.addColorStop(0, "#ff5ed2"); g.addColorStop(0.5, "#7fe9ff"); g.addColorStop(1, "#5eff9b");
    ctx.fillStyle = g;
    ctx.shadowBlur = 12; ctx.shadowColor = "#7fe9ff";
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 2; ctx.strokeStyle = "#fff";
    ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.fillStyle = "#071018";
    ctx.fillRect(0,0,innerWidth,innerHeight);
    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    ctx.strokeStyle = "#39d5ff12";
    
    for(let i=0; i<world.w; i+=100){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,world.h); ctx.stroke(); }
    for(let i=0; i<world.h; i+=100){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(world.w,i); ctx.stroke(); }
    
    let near = p.x < 150 || p.y < 150 || p.x > world.w - 150 || p.y > world.h - 150;
    ctx.lineWidth = 20;
    ctx.strokeStyle = near ? "rgba(255,0,0,.8)" : "rgba(57,213,255,.25)";
    ctx.strokeRect(0, 0, world.w, world.h);
    
    drops.forEach(o=>{ ctx.fillStyle = "#7cff5b"; ctx.beginPath(); ctx.arc(o.x, o.y, 5, 0, 6.28); ctx.fill(); });
    
    chests.forEach(c=>{
        ctx.fillStyle = "#f1c40f"; 
        ctx.fillRect(c.x - c.r, c.y - c.r * 0.75, c.r * 2, c.r * 1.5);
        ctx.fillStyle = "#fff"; 
        ctx.fillRect(c.x - 3, c.y - 2, 6, 4);
    });
    
    enemies.forEach(e=>{
        let isSlowed = performance.now() < e.slowUntil;
        ctx.fillStyle = isSlowed ? "#e0e0e0" : e.color;
        
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 6.28); ctx.fill();
        bar(e.x - e.r, e.y - e.r - 8, e.r * 2, 4, e.hp/e.maxHp, "#f55", "#400");
    });
    
    orbs.forEach(o=>{
        let ox = p.x + Math.cos(o.a) * o.d, oy = p.y + Math.sin(o.a) * o.d;
        ctx.fillStyle = "#39d5ff";
        ctx.beginPath(); ctx.arc(ox, oy, 9, 0, 6.28); ctx.fill();
    });

    apples.forEach(a => { ctx.fillStyle = "#ff2e2e"; ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, 6.28); ctx.fill(); });

    // ===== Gaiola de Faraday (anel eletrico) =====
    if (faraday.active) {
        let pn = performance.now();
        let pulse = 0.5 + 0.5 * Math.sin(pn / 70);
        ctx.save();
        // preenchimento interno suave (zona segura)
        ctx.fillStyle = "rgba(57,213,255,0.05)";
        ctx.beginPath(); ctx.arc(p.x, p.y, faraday.r, 0, 6.28); ctx.fill();
        // anel principal animado
        ctx.shadowBlur = 18; ctx.shadowColor = "#39d5ff";
        ctx.lineWidth = 4;
        ctx.strokeStyle = `rgba(120,233,255,${0.5 + 0.4 * pulse})`;
        ctx.setLineDash([14, 9]);
        ctx.lineDashOffset = -pn / 28;
        ctx.beginPath(); ctx.arc(p.x, p.y, faraday.r, 0, 6.28); ctx.stroke();
        // barras radiais (aparencia de gaiola)
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        ctx.lineWidth = 2;
        ctx.strokeStyle = `rgba(120,233,255,${0.18 + 0.16 * pulse})`;
        for (let a = 0; a < 6.28; a += Math.PI / 8) {
            ctx.beginPath();
            ctx.moveTo(p.x + Math.cos(a) * faraday.r, p.y + Math.sin(a) * faraday.r);
            ctx.lineTo(p.x + Math.cos(a) * (faraday.r - 26), p.y + Math.sin(a) * (faraday.r - 26));
            ctx.stroke();
        }
        ctx.restore();
    }

    // ===== Faiscas de abate da gaiola =====
    zaps.forEach(z => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, z.life);
        ctx.strokeStyle = "#aef6ff";
        ctx.shadowBlur = 10; ctx.shadowColor = "#39d5ff";
        ctx.lineWidth = 2;
        let rad = (1 - z.life) * 22 + 6;
        ctx.beginPath(); ctx.arc(z.x, z.y, rad, 0, 6.28); ctx.stroke();
        for (let k = 0; k < 4; k++) {
            let a = k * 1.57 + z.life * 3;
            ctx.beginPath();
            ctx.moveTo(z.x + Math.cos(a) * rad, z.y + Math.sin(a) * rad);
            ctx.lineTo(z.x + Math.cos(a) * (rad + 8), z.y + Math.sin(a) * (rad + 8));
            ctx.stroke();
        }
        ctx.restore();
    });

    // ===== Prisma de Luz (feixe de laser) =====
    if (prism.active) {
        let ax = Math.cos(prism.angle), ay = Math.sin(prism.angle);
        let ex = p.x + ax * prism.len, ey = p.y + ay * prism.len;
        ctx.save();
        ctx.lineCap = "round";
        // halo externo
        ctx.shadowBlur = 22; ctx.shadowColor = "#7fe9ff";
        ctx.strokeStyle = "rgba(127,233,255,0.28)";
        ctx.lineWidth = 16;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey); ctx.stroke();
        // nucleo branco
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255,255,255,0.96)";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey); ctx.stroke();
        ctx.restore();
    }
    
    if(visualGravRadius > 0) {
        ctx.strokeStyle = `rgba(155, 89, 182, ${visualGravRadius / 250})`;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(p.x, p.y, 250 - visualGravRadius, 0, 6.28); ctx.stroke();
        visualGravRadius -= 8;
    }

    ctx.strokeStyle = "#39d5ff44";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.pickup, 0, 6.28); ctx.stroke();
    
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = playerColor;
    ctx.fillStyle = playerColor;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
    ctx.restore();

    // Prisma flutuante sobre o personagem (quando a arma esta ativa)
    if (upLevels["Prisma de Luz"] > 0) {
        drawPrism(p.x, p.y - p.r - 22, prism.active ? 1 : 0.55);
    }
    
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + Math.cos(p.lastAngle) * (p.r + 5), p.y + Math.sin(p.lastAngle) * (p.r + 5));
    ctx.stroke();

    bar(p.x-20, p.y-30, 40, 5, p.hp/p.maxHp, "#0f0", "#400");
    
    // Desenha indicadores de dano (criticos maiores; opacidade segura ate o fim)
    ctx.textAlign = "center";
    dmgTexts.forEach(t => {
        ctx.font = t.crit ? "bold 21px system-ui" : "bold 16px system-ui";
        ctx.globalAlpha = Math.min(1, t.life * 2.8);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#000";
        ctx.strokeText(t.txt, t.x, t.y);
        ctx.fillStyle = t.col;
        ctx.fillText(t.txt, t.x, t.y);
    });
    ctx.globalAlpha = 1.0;
    
    ctx.restore();

    // Flash vermelho ao tomar dano (vinheta em espaco de tela)
    if (hurtFlash > 0.01) {
        let cxs = innerWidth / 2, cys = innerHeight / 2;
        let g = ctx.createRadialGradient(cxs, cys, Math.min(innerWidth, innerHeight) * 0.32, cxs, cys, Math.max(innerWidth, innerHeight) * 0.72);
        g.addColorStop(0, "rgba(255,0,0,0)");
        g.addColorStop(1, "rgba(255,0,0," + (0.55 * hurtFlash).toFixed(3) + ")");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, innerWidth, innerHeight);
    }
}

/* ===================== MENU INICIAL ===================== */
const startMenu = document.getElementById("startMenu"),
      charsScreen = document.getElementById("charsScreen"),
      collectScreen = document.getElementById("collectScreen"),
      charGrid = document.getElementById("charGrid"),
      collectGrid = document.getElementById("collectGrid"),
      toastEl = document.getElementById("toast");

function showScreen(name) {
    startMenu.style.display    = name === "start"    ? "flex" : "none";
    charsScreen.style.display  = name === "chars"    ? "flex" : "none";
    collectScreen.style.display= name === "collect"  ? "flex" : "none";
}

function renderChars() {
    charGrid.innerHTML = "";
    CHARS.forEach((ch, i) => {
        let card = document.createElement("button");
        card.className = "charCard" + (i === selectedChar ? " sel" : "");
        card.innerHTML =
            `<span class="charDot" style="background:${ch.color};box-shadow:0 0 14px ${ch.color}"></span>` +
            `<span class="charName">${ch.name}</span>` +
            `<span class="charDesc">${ch.desc}</span>`;
        card.onclick = () => { selectedChar = i; saveChar(); renderChars(); };
        charGrid.appendChild(card);
    });
}
function saveChar() { try { localStorage.setItem("ez_char", String(selectedChar)); } catch (e) {} }

function renderCollectibles() {
    collectGrid.innerHTML = "";
    COLLECTIBLES.forEach(col => {
        let got = unlocked.has(col.id);
        let card = document.createElement("div");
        card.className = "colCard" + (got ? " got" : "");
        card.innerHTML = got
            ? `<span class="colIco">✦</span><span class="colName">${col.name}</span><span class="colFact">${col.fact}</span>`
            : `<span class="colIco">?</span><span class="colName">Bloqueado</span><span class="colFact">${col.cond}</span>`;
        collectGrid.appendChild(card);
    });
}

function snapshot() {
    return {
        kills: kills, time: elapsedTime / 1000, lv: p.lv, chests: chestsOpened,
        faraday: upLevels["Gaiola de Faraday"] > 0, prism: upLevels["Prisma de Luz"] > 0
    };
}
function checkCollectibles() {
    let st = snapshot();
    COLLECTIBLES.forEach(col => {
        if (!unlocked.has(col.id) && col.check(st)) {
            unlocked.add(col.id);
            saveSet("ez_unlocked", unlocked);
            showToast("Colecionável: " + col.name);
        }
    });
}

let toastTimer = null;
function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add("show");
    sndChest();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2600);
}

function startGame() {
    unlockAudio();
    CHARS[selectedChar].apply();         // aplica o bonus do personagem
    playerColor = CHARS[selectedChar].color;
    showScreen("none");
    document.body.classList.remove("menu-open");
    gameStarted = true;
    paused = false;
    lastTime = performance.now();         // evita salto de tempo apos o menu
}

function goToPlatform() { window.location.href = PLATAFORMA_URL; }

document.getElementById("btnStart").onclick    = startGame;
document.getElementById("btnChars").onclick    = () => { renderChars(); showScreen("chars"); };
document.getElementById("btnCollect").onclick  = () => { renderCollectibles(); showScreen("collect"); };
document.getElementById("btnPlatform").onclick = goToPlatform;
document.querySelectorAll(".btnBack").forEach(b => b.onclick = () => showScreen("start"));

document.body.classList.add("menu-open");
showScreen("start");

(function loop() {
    upd();
    draw();
    requestAnimationFrame(loop);
})();
</script>
